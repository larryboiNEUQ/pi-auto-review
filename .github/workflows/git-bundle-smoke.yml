name: Git bundle smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-and-load:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin/arm64
          - os: windows-latest
            platform: win32/x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install the pinned Pi CLI
        run: npm install --global @earendil-works/pi-coding-agent@0.81.0

      - name: Install the bundle workspace
        run: npm ci --ignore-scripts

      - name: Verify delegated approval behavior matrix
        run: npm test

      - name: Authenticate Git without changing the recorded source URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node -e "const { spawnSync } = require('node:child_process');
          const token = Buffer.from('x-access-token:' + process.env.GH_TOKEN).toString('base64');
          const result = spawnSync('git', ['config', '--global', 'http.https://github.com/.extraheader', 'AUTHORIZATION: basic ' + token], { stdio: 'inherit' });
          process.exit(result.status ?? 1);"

      - name: Verify real Git install, load, and update
        run: node scripts/verify-git-bundle.mjs --source https://github.com/${{ github.repository }}@${{ github.sha }} --expect-platform ${{ matrix.platform }}

      - name: Verify a changed-HEAD Git update reinstalls dependencies
        run: node scripts/verify-git-bundle.mjs --expect-platform ${{ matrix.platform }}
